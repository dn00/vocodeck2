# voco config — M1 MacBook Pro profile (SPEC §11)
# Copy to ~/.config/voco/config.toml or pass --config.

[audio]
duplex = "full_duplex"          # headset assumed; "half_duplex" for speakers
ptt_key = "f9"
silero_model = "models/silero_vad.onnx"
# input_device / output_device: sounddevice name or index (default: system)
dispatch_hold_ms = 800
reopen_window_ms = 1200
min_speech_ms = 384
min_speech_continuation_ms = 192
min_silence_ms = 64
vad_threshold = 0.5
# aec = true                     # experimental FDAF echo cancel (open speakers
#                                # + full_duplex); validate live before trusting

[stt]
provider = "faster-whisper"
model_size = "small"
device = "cpu"                   # mlx providers land per SPEC §4.2

[tts]
# Existing mlx-audio server (SPEC §4.3)
base_url = "http://127.0.0.1:8000/v1"
model = "mlx-community/Kokoro-82M-bf16"
voice = "af_heart"
sample_rate = 24000

# [first_mate]                   # local Gemma tier (SPEC §7)
# Serve with: llama-server -hf ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M \
#   --port 8080 -c 4096 --reasoning-budget 0 -ngl 99
# (--reasoning-budget 0 is REQUIRED: Gemma 4 thinking tokens otherwise eat
#  the whole completion — calibrated 2026-07-03, scripts/mate_calibrate.py)
# base_url = "http://127.0.0.1:8080/v1"
# model = "gemma-4-e4b-it"
# timeout_ms = 800               # M1 measured p50 ~2000ms (gen-bound): either
#                                # raise this (slower dispatch) or use a smaller
#                                # model; 3090 expected well under 800
# stream = true                 # speak the mate's first sentence while the
#                                # rest of its JSON is still generating —
#                                # measured M1 2026-07-04: first speech delta
#                                # 0.75-1.6s vs 1.8s+ plain (mate_stream_smoke).
#                                # Default off until validated by ear.

# [bridge]
# token = ""                     # bearer token; default-on for remote attach
