# voco config — Windows / RTX 3090 profile (primary v1 target, SPEC §11)
# Copy to %USERPROFILE%\.config\voco\config.toml or pass --config.
#
# GPU services (run each, natively or in WSL2 — they're just HTTP):
#   TTS: faster-qwen3-tts server  -> http://127.0.0.1:8880/v1
#   LLM: llama-server -m gemma-4-e4b-it-Q4_K_M.gguf --port 8080
# WSL2 note (SPEC §9.2): daemon binds loopback only. Use WSL2 mirrored
# networking (.wslconfig networkingMode=mirrored) or sshd-in-WSL2 +
# RemoteForward; never portproxy/0.0.0.0.

[audio]
duplex = "half_duplex"           # speakers default; "full_duplex" w/ headset
ptt_key = "f9"
silero_model = "models/silero_vad.onnx"
dispatch_hold_ms = 800
reopen_window_ms = 1200
min_speech_ms = 384
min_speech_continuation_ms = 192
min_silence_ms = 64
vad_threshold = 0.5

[stt]
provider = "faster-whisper"      # parakeet provider lands per SPEC §4.2
model_size = "large-v3-turbo"
device = "cuda"

[tts]
# faster-qwen3-tts OpenAI-compatible endpoint (measure TTFA at M0 exit —
# published numbers are 4090; expect ~250-400ms here, SPEC §4.3)
base_url = "http://127.0.0.1:8880/v1"
model = "qwen3-tts"
voice = "default"
sample_rate = 24000

# [first_mate]                   # local Gemma tier (SPEC §7)
# Serve with: llama-server -hf ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M \
#   --port 8080 -c 4096 --reasoning-budget 0 -ngl 99
# (--reasoning-budget 0 is REQUIRED: Gemma 4 thinking tokens otherwise eat
#  the whole completion — calibrated 2026-07-03, scripts/mate_calibrate.py)
# base_url = "http://127.0.0.1:8080/v1"
# model = "gemma-4-e4b-it"
# timeout_ms = 800               # M1 measured p50 ~2000ms (gen-bound): either
#                                # raise this (slower dispatch) or use a smaller
#                                # model; 3090 expected well under 800

